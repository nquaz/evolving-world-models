minimum_pre_commit_version: "4.3.0"
default_install_hook_types: [pre-commit, pre-push]
default_stages: [pre-commit]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-toml
      - id: check-yaml
      - id: check-json
        types: [file]
        files: '\.(json|ipynb)$'
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-symlinks
      - id: destroyed-symlinks
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: debug-statements
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.22
    hooks:
      - id: ruff-check
        args: [--fix]
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        name: mypy (production modules)
        args: [scripts]
        pass_filenames: false
        files: '^(scripts/.*\.py|pyproject\.toml)$'

  - repo: local
    hooks:
      - id: unit-tests
        name: unit tests
        entry: python -B -m unittest discover -s tests -v
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
      - id: compileall
        name: compile Python sources
        entry: python -m compileall -q scripts tests
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
